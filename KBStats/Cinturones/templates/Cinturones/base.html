<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KBStats</title>

    {% load static %}

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      href="{% static 'images/team_kaiju.png' %}"
    />

    <!-- CSS global de tu proyecto -->
    <link rel="stylesheet" href="{% static 'css/kbstats.css' %}" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- CSS extra por página -->
    {% block extra_css %}{% endblock %}
  </head>

  <body class="wrapper">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center fs-3" href="/">KB Stats</a>
        <div class="d-flex gap-3 ms-auto align-items-center">
          <a class="nav-link text-secondary" href="{% url 'promedios_jugadores' %}?format=html" style="font-size:0.85rem;">Promedios</a>
          <a class="nav-link text-secondary" href="{% url 'tier_list' %}" style="font-size:0.85rem;">Tier List</a>
          <a class="nav-link text-secondary" href="{% url 'ladder' %}" style="font-size:0.85rem;">Ladder</a>
          {% if user.is_superuser %}
          <a class="nav-link" href="{% url 'ladder_config' %}" style="font-size:0.85rem;color:#22d3ee;">⚙ Admin</a>
          <form method="post" action="{% url 'logout' %}" style="display:inline;margin:0;">
            {% csrf_token %}
            <button type="submit" class="nav-link btn btn-link" style="font-size:0.82rem;color:#6b7280;padding:0;border:none;background:none;cursor:pointer;">Salir</button>
          </form>
          {% endif %}
        </div>
      </div>
    </nav>

    <main class="container">{% block content %}{% endblock %}</main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
